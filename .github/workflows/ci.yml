name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        # Must run BEFORE setup-node: its `cache: 'yarn'` step invokes yarn to
        # locate the cache folder, and the Berry version (yarn@4, declared via
        # the packageManager field) has to be active by then — otherwise yarn
        # resolves to the runner's global 1.x and the cache step errors out.
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Quality Gate
        # Direct invocation — `yarn quality` was removed when the public
        # script surface collapsed to dev/prod. CI calls the gate script
        # the same way pre-push does.
        run: node config/scripts/quality_gate.js full

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for `gitleaks detect` to scan past
          # commits — shallow clones (default fetch-depth: 1) miss them.
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Commit lint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: config/commitlint.config.cjs
          # Lint only the most recent commits, not the full PR range. When main
          # lags far behind a long-lived branch, the default (every commit since
          # base) re-litigates old history and trips on pre-existing messages
          # that can't be cheaply rewritten. The commit-msg hook already gates
          # each commit at authoring time; this CI pass is a backstop for the
          # latest work.
          commitDepth: 10
      - name: Gitleaks (full history)
        # Detects credentials anywhere in the repo's git history. Pre-commit
        # hooks only scan staged content; CI catches anything that was
        # force-pushed, amended, or merged in from a fork. `gitleaks git`
        # is the v8.30+ replacement for the deprecated `detect` command.
        run: node config/scripts/gitleaks_run.js git --no-banner --redact --verbose --config=config/gitleaks.toml

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        # Must run BEFORE setup-node: its `cache: 'yarn'` step invokes yarn to
        # locate the cache folder, and the Berry version (yarn@4, declared via
        # the packageManager field) has to be active by then — otherwise yarn
        # resolves to the runner's global 1.x and the cache step errors out.
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build H5 + server + perf gate
        # Verifies the vite prod build (terser, dual artefacts) + tsc server
        # compile actually succeed, and runs the bundle-size perf baseline
        # gate — both live in the prod pipeline (config/scripts/build/prod.js),
        # not the quality gate. --skip-quality: the `verify` job already ran
        # the gate on this commit. --target h5,server matches what we ship +
        # what the perf baseline measures (no mp-weixin bundle here).
        run: node config/scripts/build/index.js --prod --target h5,server --skip-quality
