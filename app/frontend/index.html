<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP is enforced by the backend (server/src/app.ts via helmet) so it can
      branch on dev vs prod (allowing http://localhost:* + data: in dev for the
      Vite proxy at :4123 → express :4124, plus woff2/data URIs). A duplicate
      <meta> CSP here would be intersected with the response header by the
      browser, silently overriding the backend's config. Do not re-add a
      CSP meta tag.
    -->
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <script>
      /* design_flexible: rem 自适应运行时（H5 入口 FOUC 防护，必须在 first
         paint 前同步执行）。基准 iPhone 14 Pro Max (430×932)，下限 iPhone 8
         (375×667)，rem 基数 43。
         公式 scale = clamp(0.87209, w/430, 1)（单轴宽度；高度由 .canvas
         height:100vh + 内部 flex 自适应消化）。
         too-small = (w<375 || h<667)：触发顶部横幅 + body 滚动兜底。
         Vue 镜像与单测在 src/core/sizing/design_flexible.ts，公式同源。

         === uni-h5 干扰反制 ===
         @dcloudio/uni-h5 的 useRem 在 DOMContentLoaded / load / resize 时
         强制写 `html.style.fontSize = innerWidth/23.4375`（rpx 链 fontSize
         基础），覆盖本脚本的写入。本项目 N1 起用 postcss-pxtorem rootValue=43
         接管 rem 长度计算，必须阻止 uni-h5 写覆盖。
         策略：用 MutationObserver 监听 html.style 变化，发现 fontSize 偏离
         本脚本期望值就立刻改回来。Observer 内部用 expected 字符串 ===
         比较短路，避免无限循环。 */
      (function () {
        var BASELINE_W = 430
        var FLOOR_W = 375
        var FLOOR_H = 667
        var REM_BASE = 43
        var FLOOR_RATIO = FLOOR_W / BASELINE_W
        var expected = ''
        function compute() {
          var w = window.innerWidth
          var h = window.innerHeight
          var ratio = w / BASELINE_W
          if (ratio > 1) ratio = 1
          else if (ratio < FLOOR_RATIO) ratio = FLOOR_RATIO
          expected = (REM_BASE * ratio) + 'px'
          document.documentElement.dataset.tooSmall = (w < FLOOR_W || h < FLOOR_H) ? '1' : '0'
        }
        function enforce() {
          if (document.documentElement.style.fontSize !== expected) {
            document.documentElement.style.fontSize = expected
          }
        }
        compute()
        enforce()
        new MutationObserver(function () { enforce() })
          .observe(document.documentElement, { attributes: true, attributeFilter: ['style'] })
        var rafId = null
        function schedule() {
          if (rafId !== null) return
          rafId = window.requestAnimationFrame(function () {
            rafId = null
            compute()
            enforce()
          })
        }
        window.addEventListener('resize', schedule, { passive: true })
        window.addEventListener('orientationchange', schedule, { passive: true })
      })()
    </script>
    <title>Mimir—每日塔罗答案</title>
    <!--
      Preload the idle deck's hero image so the browser starts fetching it
      during HTML parse, in parallel with the JS boot — by the time
      App.vue.bootstrap() decodes it the bytes are already in flight. The
      path is the single shipped theme (golden_dawn), consistent with the
      hard-coded @font-face URLs in App.vue. Served origin-relative via the
      backend / vite publicDir.
    -->
    <link rel="preload" as="image" type="image/webp" href="/static/themes/golden_dawn/tarot/card_back.webp" />
    <!--preload-links-->
    <!--app-context-->
    <style data-skeleton>
      /*
       * Layer 1 App Shell — pure HTML / CSS boot skeleton (zero JS, zero
       * network round-trips). Rendered the moment the HTML parser sees
       * `<div id="app">`; Vue's `app.mount('#app')` later replaces this
       * subtree with the real `LoadingView` (Layer 2). Geometry, colours
       * and rough cadence mirror `flows/loading/composables/orbits.ts` so
       * the visual hand-off is seamless: same accent gold, same elliptical
       * tracks (rx 80/120/165/210, ry 28/42/58/74), same four-body layout.
       * Motion is approximate — exact periods (2π/speed ≈ 12/17/23/35 s)
       * are rounded to whole seconds since CSS keyframes can't read the
       * GSAP ticker. We intentionally ship no copy here to avoid FOUT
       * when Layer 2 with its TitleContent takes over.
       *
       * The accent colour constants duplicate `core/styles/global.css`
       * (--color-accent #b8943e / --color-accent-raw 184,148,62 /
       * --color-bg-page #F7F0E0). Layer 1 must paint before any external
       * stylesheet arrives, so the literal values are inlined; after
       * global.css loads, Layer 2 picks up the canonical variables, so
       * there is no visual jump at the hand-off.
       *
       * Every selector contains `.ignore-rem` so vite.config.ts's
       * postcss-pxtorem / postcss-pxtorpx selectorBlackList preserves
       * the literal `px` values (otherwise 480px → 11.16rem because the
       * rem base shifts by viewport). The root `.boot-skeleton` element
       * carries both class names.
       */
      .ignore-rem.boot-skeleton {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F7F0E0;
        overflow: hidden;
        z-index: 0;
      }
      .ignore-rem .boot-skeleton__scene {
        position: relative;
        width: 480px;
        height: 200px;
      }
      .ignore-rem .boot-skeleton__track {
        position: absolute;
        top: 50%;
        left: 50%;
        border: 1px solid rgba(184, 148, 62, 0.18);
        border-radius: 50%;
        pointer-events: none;
      }
      .ignore-rem .boot-skeleton__track--1 { width: 160px; height: 56px;  margin: -28px 0 0 -80px;  }
      .ignore-rem .boot-skeleton__track--2 { width: 240px; height: 84px;  margin: -42px 0 0 -120px; }
      .ignore-rem .boot-skeleton__track--3 { width: 330px; height: 116px; margin: -58px 0 0 -165px; }
      .ignore-rem .boot-skeleton__track--4 { width: 420px; height: 148px; margin: -74px 0 0 -210px; }
      .ignore-rem .boot-skeleton__star {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        margin: -10px 0 0 -10px;
        border-radius: 50%;
        background: radial-gradient(circle, #fff9e6 0%, #b8943e 40%, rgba(184, 148, 62, 0) 75%);
        box-shadow:
          0 0 12px 4px rgba(184, 148, 62, 0.6),
          0 0 28px 8px rgba(184, 148, 62, 0.25);
        z-index: 15;
      }
      /*
       * Each orbit slot wraps its planet and is the rotating element.
       * The inner .boot-skeleton__planet is translated outward along the
       * track's horizontal semi-axis so rotating the wrapper draws the
       * planet around the ellipse. Vertical squash is achieved by
       * scaleY(ry/rx) on the wrapper. (Mimics the parametric trig in
       * orbits.ts without the depth-scale lerp — Layer 2 takes over
       * before motion would visibly drift.)
       */
      .ignore-rem .boot-skeleton__slot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        transform-origin: 0 0;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
      }
      .ignore-rem .boot-skeleton__slot--1 { transform: scaleY(0.35); animation: boot-skel-orbit 12s linear infinite; }
      .ignore-rem .boot-skeleton__slot--2 { transform: scaleY(0.35); animation: boot-skel-orbit 17s linear infinite -7s; }
      .ignore-rem .boot-skeleton__slot--3 { transform: scaleY(0.35); animation: boot-skel-orbit 23s linear infinite -15s; }
      .ignore-rem .boot-skeleton__slot--4 { transform: scaleY(0.35); animation: boot-skel-orbit 35s linear infinite -29s; }
      @keyframes boot-skel-orbit {
        from { transform: scaleY(0.35) rotate(0deg);   }
        to   { transform: scaleY(0.35) rotate(360deg); }
      }
      .ignore-rem .boot-skeleton__planet {
        position: absolute;
        top: 0;
        left: 0;
      }
      .ignore-rem .boot-skeleton__planet--1 { transform: translate(80px, 0); }
      .ignore-rem .boot-skeleton__planet--2 { transform: translate(120px, 0); }
      .ignore-rem .boot-skeleton__planet--3 { transform: translate(165px, 0); }
      .ignore-rem .boot-skeleton__planet--4 { transform: translate(210px, 0); }
      /* Glyphs reuse the four shapes from LoadingOrbits.vue. */
      .ignore-rem .boot-skeleton__glyph {
        position: absolute;
        top: 0;
        left: 0;
        animation: boot-skel-spin 4s linear infinite;
      }
      .ignore-rem .boot-skeleton__glyph--tetrahedron {
        width: 0;
        height: 0;
        margin: -7px 0 0 -8px;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-bottom: 14px solid #b8943e;
        filter: drop-shadow(0 0 4px rgba(184, 148, 62, 0.5));
      }
      .ignore-rem .boot-skeleton__glyph--parallelepiped {
        width: 14px;
        height: 10px;
        margin: -5px 0 0 -7px;
        background: #b8943e;
        clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
        filter: drop-shadow(0 0 4px rgba(184, 148, 62, 0.5));
      }
      .ignore-rem .boot-skeleton__glyph--sphere {
        width: 14px;
        height: 14px;
        margin: -7px 0 0 -7px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #fff9e6 0%, #b8943e 55%, rgba(184, 148, 62, 0.4) 100%);
        box-shadow: 0 0 6px 2px rgba(184, 148, 62, 0.35);
      }
      .ignore-rem .boot-skeleton__glyph--octahedron {
        width: 12px;
        height: 12px;
        margin: -6px 0 0 -6px;
        background: #b8943e;
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        filter: drop-shadow(0 0 4px rgba(184, 148, 62, 0.5));
      }
      @keyframes boot-skel-spin {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .ignore-rem .boot-skeleton__slot,
        .ignore-rem .boot-skeleton__glyph { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="app"><!--app-html--><div class="boot-skeleton ignore-rem" aria-hidden="true">
      <div class="boot-skeleton__scene">
        <div class="boot-skeleton__track boot-skeleton__track--1"></div>
        <div class="boot-skeleton__track boot-skeleton__track--2"></div>
        <div class="boot-skeleton__track boot-skeleton__track--3"></div>
        <div class="boot-skeleton__track boot-skeleton__track--4"></div>
        <div class="boot-skeleton__star"></div>
        <div class="boot-skeleton__slot boot-skeleton__slot--1"><div class="boot-skeleton__planet boot-skeleton__planet--1"><div class="boot-skeleton__glyph boot-skeleton__glyph--tetrahedron"></div></div></div>
        <div class="boot-skeleton__slot boot-skeleton__slot--2"><div class="boot-skeleton__planet boot-skeleton__planet--2"><div class="boot-skeleton__glyph boot-skeleton__glyph--parallelepiped"></div></div></div>
        <div class="boot-skeleton__slot boot-skeleton__slot--3"><div class="boot-skeleton__planet boot-skeleton__planet--3"><div class="boot-skeleton__glyph boot-skeleton__glyph--sphere"></div></div></div>
        <div class="boot-skeleton__slot boot-skeleton__slot--4"><div class="boot-skeleton__planet boot-skeleton__planet--4"><div class="boot-skeleton__glyph boot-skeleton__glyph--octahedron"></div></div></div>
      </div>
    </div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
