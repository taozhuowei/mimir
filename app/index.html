<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP is enforced by the backend (server/src/app.ts via helmet) so it can
      branch on dev vs prod (allowing http://localhost:* + data: in dev for the
      Vite proxy at :4123 → express :4124, plus woff2/data URIs). A duplicate
      <meta> CSP here would be intersected with the response header by the
      browser, silently overriding the backend's config. Do not re-add a
      CSP meta tag.
    -->
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <script>
      /* design_flexible: rem 自适应运行时（H5 入口 FOUC 防护，必须在 first
         paint 前同步执行）。基准 iPhone 14 Pro Max (430×932)，下限 iPhone 8
         (375 宽)，rem 基数 43。公式 scale = clamp(0.87209, w/430, 1)。
         Vue 镜像与单测在 src/core/sizing/design_flexible.ts，公式同源。 */
      (function () {
        var BASELINE_W = 430
        var FLOOR_W = 375
        var FLOOR_H = 667
        var REM_BASE = 43
        var FLOOR_RATIO = FLOOR_W / BASELINE_W
        var rafId = null
        function tick() {
          rafId = null
          var w = window.innerWidth
          var h = window.innerHeight
          var ratio = w / BASELINE_W
          if (ratio > 1) ratio = 1
          else if (ratio < FLOOR_RATIO) ratio = FLOOR_RATIO
          document.documentElement.style.fontSize = (REM_BASE * ratio) + 'px'
          document.documentElement.dataset.tooSmall = (w < FLOOR_W || h < FLOOR_H) ? '1' : '0'
        }
        function schedule() {
          if (rafId !== null) return
          rafId = window.requestAnimationFrame(tick)
        }
        tick()
        window.addEventListener('resize', schedule, { passive: true })
        window.addEventListener('orientationchange', schedule, { passive: true })
      })()
    </script>
    <title>SCALES TAROT</title>
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
